name: CI - Registro Magos

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # Job 1: Compilar y correr tests unitarios
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: code-checkout
        uses: actions/checkout@v4

      - name: JDK-configuration
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build + Tests
        run: ./mvnw clean verify -B

      - name: publish test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

  # Job 2: Smoke test con docker compose
  smoke-test-compose:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: code-checkout
        uses: actions/checkout@v4

      - name: Create test .env
        run: |
          echo "DB_URL=jdbc:postgresql://db:5432/registro_magos_ci" >> .env
          echo "DB_USER=ci_user" >> .env
          echo "DB_PASSWORD=ci_password" >> .env

      - name: Verify .env
        run: cat .env

      - name: docker-compose-up
        run: docker compose up --build -d

      - name: wait-response
        run: |
          for i in $(seq 1 15); do
            if curl -s http://localhost:8080/api/wizards -o /dev/null; then
              echo "La aplicación respondió correctamente."
              exit 0
            fi
            echo "Esperando que la app inicie... ($i/15)"
            sleep 5
          done
          echo "La app no respondió a tiempo"
          exit 1

      - name: show-logs
        if: always()
        run: docker compose logs

      - name: shutdown
        if: always()
        run: docker compose down -v
